<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金收益 - 账户分组管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .app-container { display: flex; min-height: 100vh; }

    /* 左侧边栏 */
    .sidebar {
      width: 280px;
      background: rgba(0, 0, 0, 0.2);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
    }

    .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .sidebar-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

    .add-account-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; border-radius: 8px;
      color: white; font-size: 13px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .add-account-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .account-list { flex: 1; overflow-y: auto; padding: 10px; }

    .account-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
    }
    .account-item:hover { background: rgba(255, 255, 255, 0.08); }
    .account-item.active { 
      border-color: #667eea; 
      background: rgba(102, 126, 234, 0.15); 
    }
    .account-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: #667eea;
    }

    .account-item-content {
      padding: 12px;
      display: block;
      width: 100%;
      text-align: left;
    }

    .account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .account-name { font-size: 13px; font-weight: 500; }
    /* 当日收益：涨红跌绿 */
    .account-today { font-size: 12px; font-weight: bold; color: #ff4d4f; }
    .account-today.negative { color: #00ff88; }
    .account-stats { font-size: 10px; opacity: 0.6; }

    /* 账户编辑按钮 */
    .account-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .account-action-btn {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.2s;
    }
    .account-action-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }
    .account-action-btn.delete:hover {
      background: rgba(255, 71, 87, 0.3);
      color: #ff4757;
    }

    /* 主内容区 */
    .main-content { flex: 1; margin-left: 280px; padding: 25px; }

    /* 概览卡片 */
    .overview-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 0;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
      overflow: hidden;
    }

    .overview-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 16px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.1);
    }
    .overview-title { font-size: 15px; font-weight: 600; }
    .overview-time { font-size: 11px; opacity: 0.7; }

    .profit-main {
      display: flex;
      padding: 20px 25px;
      gap: 40px;
    }

    .profit-left {
      flex: 1;
      text-align: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
    }
    .profit-left .section-label { font-size: 12px; opacity: 0.8; margin-bottom: 8px; }
    /* 当日收益：涨红跌绿 */
    .profit-left .section-amount { font-size: 32px; font-weight: bold; color: #ff4d4f; }
    .profit-left .section-amount.negative { color: #00ff88; }
    .profit-left .section-rate { font-size: 14px; opacity: 0.8; margin-top: 4px; }
    .section-date { font-size: 10px; opacity: 0.6; margin-top: 4px; color: rgba(255,255,255,0.5); }

    .profit-all-today {
      flex: 1;
      text-align: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .profit-all-today .section-label { font-size: 12px; opacity: 0.8; margin-bottom: 8px; }
    .profit-all-today .section-amount { font-size: 28px; font-weight: bold; color: #ffd700; }
    .profit-all-today .section-amount.negative { color: #00ff88; }
    .profit-all-today .section-rate { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    .profit-right {
      flex: 1.5;
      text-align: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .profit-right .section-label { font-size: 13px; opacity: 0.8; margin-bottom: 8px; }
    .profit-right .section-amount {
      font-size: 42px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .profit-right .section-amount.negative { color: #00ff88; }
    .profit-right .section-rate { font-size: 15px; opacity: 0.9; margin-top: 4px; font-weight: 500; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.1);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .stat-item { text-align: center; padding: 18px 10px; background: rgba(0,0,0,0.1); }
    .stat-value { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .stat-label { font-size: 11px; opacity: 0.7; }

    /* 基金列表 */
    .fund-section { margin-top: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .section-title { font-size: 15px; font-weight: 600; }

    .add-fund-btn {
      padding: 8px 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; border-radius: 8px;
      color: white; font-size: 12px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .add-fund-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .fund-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .fund-card:hover { background: rgba(255, 255, 255, 0.08); }
    .fund-card.unconfirmed { opacity: 0.6; border: 1px dashed rgba(255,255,255,0.2); }

    .fund-info { flex: 1; }
    .fund-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .fund-meta { font-size: 10px; opacity: 0.5; display: flex; gap: 10px; flex-wrap: wrap; }
    .fund-details { font-size: 11px; opacity: 0.6; }
    .fund-networth { font-size: 10px; opacity: 0.5; }

    .fund-profit { text-align: right; margin-right: 10px; }
    .fund-profit-amount { font-size: 15px; font-weight: bold; color: #ffd700; }
    .fund-profit-amount.negative { color: #00ff88; }
    .fund-profit-rate { font-size: 11px; opacity: 0.7; }

    .fund-today { text-align: right; margin-right: 10px; min-width: 80px; }
    /* 当日收益：涨红跌绿 */
    .fund-today-amount { font-size: 14px; font-weight: bold; color: #ff4d4f; }
    .fund-today-amount.negative { color: #00ff88; }
    .fund-today-label { font-size: 10px; opacity: 0.6; }

    .fund-actions { display: flex; gap: 6px; }
    .fund-action-btn {
      padding: 5px 8px;
      border-radius: 6px;
      border: none;
      font-size: 11px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transition: background 0.2s;
    }
    .fund-action-btn:hover { background: rgba(255, 255, 255, 0.2); }
    .fund-action-btn.delete { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
    .fund-action-btn.delete:hover { background: rgba(255, 71, 87, 0.4); }

    .empty-state { text-align: center; padding: 50px; opacity: 0.7; }
    .empty-icon { font-size: 48px; margin-bottom: 15px; }
    .empty-text { font-size: 14px; margin-bottom: 8px; }
    .empty-hint { font-size: 12px; opacity: 0.5; }

    /* 模态框 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none; justify-content: center; align-items: center;
      z-index: 1000; backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px; padding: 25px;
      width: 90%; max-width: 480px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; text-align: center; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; margin-bottom: 6px; opacity: 0.8; }
    .form-input, .form-select {
      width: 100%; padding: 11px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white; font-size: 13px;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: #667eea; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .shares-preview {
      background: rgba(102, 126, 234, 0.15);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-top: 8px;
    }
    .shares-preview span { color: #667eea; font-weight: 600; }

    /* 基金搜索下拉 */
    .fund-search-wrapper { position: relative; }
    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 4px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .search-dropdown.show { display: block; }
    .search-dropdown.loading { padding: 20px; text-align: center; }
    .search-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(102, 126, 234, 0.2); }
    .search-item.selected { background: rgba(102, 126, 234, 0.3); }
    .search-item-left { flex: 1; }
    .search-item-name { font-size: 13px; font-weight: 500; }
    .search-item-code { font-size: 11px; opacity: 0.5; margin-top: 2px; }
    .search-item-right { text-align: right; }
    .search-item-networth { font-size: 11px; opacity: 0.6; }
    .search-item-rate { font-size: 12px; font-weight: 600; margin-top: 2px; }
    .search-item-rate.up { color: #ff4d4f; }
    .search-item-rate.down { color: #00ff88; }
    .search-empty { padding: 20px; text-align: center; opacity: 0.5; font-size: 13px; }

    /* 选中基金显示 */
    .selected-fund {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .selected-fund-info { flex: 1; }
    .selected-fund-name { font-size: 13px; font-weight: 500; }
    .selected-fund-code { font-size: 11px; opacity: 0.5; margin-top: 2px; }
    .selected-fund-change {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .selected-fund-change.up { background: rgba(255,77,79,0.2); color: #ff4d4f; }
    .selected-fund-change.down { background: rgba(0,255,136,0.2); color: #00ff88; }
    .selected-fund-remove {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 18px;
      margin-left: 10px;
      padding: 4px;
    }
    .selected-fund-remove:hover { color: #ff4d4f; }

    /* 净值获取状态 */
    .networth-status {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 6px;
      display: none;
    }
    .networth-status.loading {
      display: block;
      background: rgba(102, 126, 234, 0.15);
      color: rgba(255,255,255,0.7);
    }
    .networth-status.success {
      display: block;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
    }
    .networth-status.warning {
      display: block;
      background: rgba(255, 152, 0, 0.15);
      color: #ff9800;
    }
    .networth-status.error {
      display: block;
      background: rgba(255, 71, 87, 0.15);
      color: #ff4757;
    }

    .checkbox-group { display: flex; align-items: center; gap: 8px; }
    .checkbox-input { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-label { font-size: 12px; opacity: 0.8; cursor: pointer; }

    .form-hint { font-size: 10px; opacity: 0.5; margin-top: 4px; }

    .form-btn-group { display: flex; gap: 10px; margin-top: 18px; }
    .btn { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: rgba(255, 255, 255, 0.1); color: white; }
    .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; z-index: 2000;
      opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }

    .loading { text-align: center; padding: 40px; opacity: 0.7; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 左侧账户列表 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">📁 账户列表</div>
        <button class="add-account-btn" id="addAccountBtn">+ 新增账户</button>
      </div>
      <div class="account-list" id="accountList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
      <!-- 概览卡片 -->
      <div class="overview-card">
        <div class="overview-header">
          <div class="overview-title" id="currentAccountName">📊 总收益概览</div>
          <div class="overview-time" id="updateTime">--</div>
        </div>

        <div class="profit-main">
          <div class="profit-left">
            <div class="section-label">💰 当日收益</div>
            <div class="section-amount" id="todayProfitAmount">+0.00</div>
            <div class="section-rate" id="todayProfitRate">+0.00%</div>
            <div class="section-date" id="todayProfitDate"></div>
          </div>

          <div class="profit-right">
            <div class="section-label">📈 累计收益</div>
            <div class="section-amount" id="totalProfitAmount">+0.00</div>
            <div class="section-rate" id="totalProfitRate">+0.00%</div>
          </div>

          <!-- 所有账户当日总收益 -->
          <div class="profit-all-today">
            <div class="section-label">🌐 全部账户</div>
            <div class="section-amount" id="allTodayProfitAmount">+0.00</div>
            <div class="section-rate" id="allTodayProfitRate">+0.00%</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalInvestment">0.00</div>
            <div class="stat-label">总投入</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalCurrentValue">0.00</div>
            <div class="stat-label">当前市值</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalHoldings">0</div>
            <div class="stat-label">持仓数</div>
          </div>
        </div>
      </div>

      <!-- 基金列表 -->
      <div class="fund-section">
        <div class="section-header">
          <div class="section-title">💼 持仓明细</div>
          <button class="add-fund-btn" id="addFundBtn">+ 添加基金</button>
        </div>
        <div id="fundList">
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-text">选择一个账户</div>
            <div class="empty-hint">或新增一个账户开始管理</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 账户模态框 -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal">
      <div class="modal-title" id="accountModalTitle">新增账户</div>
      <form id="accountForm">
        <input type="hidden" id="editAccountId">
        <div class="form-group">
          <label class="form-label">账户名称</label>
          <input type="text" class="form-input" id="accountName" placeholder="例如：支付宝、天天基金" required>
        </div>
        <div class="form-group">
          <label class="form-label">备注（可选）</label>
          <input type="text" class="form-input" id="accountDesc" placeholder="例如：养老计划">
        </div>
        <div class="form-btn-group">
          <button type="button" class="btn btn-cancel" id="cancelAccountBtn">取消</button>
          <button type="submit" class="btn btn-submit" id="accountSubmitBtn">创建</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 基金模态框 -->
  <div class="modal-overlay" id="fundModal">
    <div class="modal">
      <div class="modal-title" id="fundModalTitle">添加基金</div>
      <form id="fundForm">
        <input type="hidden" id="editFundId">
        <input type="hidden" id="fundCode">
        <input type="hidden" id="buyNetWorth">

        <!-- 基金搜索 -->
        <div class="form-group">
          <label class="form-label">基金名称/代码</label>
          <div class="fund-search-wrapper">
            <input type="text" class="form-input" id="fundSearchInput" placeholder="输入基金名称或6位代码搜索..." autocomplete="off">
            <div class="search-dropdown" id="searchDropdown">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
          <!-- 选中基金显示 -->
          <div class="selected-fund" id="selectedFundDisplay" style="display:none;">
            <div class="selected-fund-info">
              <div class="selected-fund-name" id="selectedFundName">-</div>
              <div class="selected-fund-code" id="selectedFundCode">-</div>
            </div>
            <span class="selected-fund-change" id="selectedFundChange">-</span>
            <button type="button" class="selected-fund-remove" id="removeSelectedFund">×</button>
          </div>
        </div>

        <!-- 买入信息 -->
        <div class="form-group">
          <label class="form-label">买入金额 (元)</label>
          <input type="number" class="form-input" id="buyAmount" placeholder="例如：10000" step="0.01">
        </div>

        <div class="form-group">
          <label class="form-label">购买日期</label>
          <div style="display: flex; align-items: center; gap: 10px;">
            <input type="date" class="form-input" id="fundDate" style="flex: 1;">
            <div class="checkbox-group" style="white-space: nowrap;">
              <input type="checkbox" id="before315" class="checkbox-input" checked>
              <label for="before315" class="checkbox-label">15:00前</label>
            </div>
          </div>
        </div>

        <!-- 净值状态显示 -->
        <div class="networth-status" id="networthStatus"></div>
        <div class="shares-preview" id="sharesPreview">
          预计持有份额：<span>--</span> 份
        </div>

        <!-- 历史收益调整 -->
        <div class="form-group" style="margin-top: 14px;">
          <label class="form-label">历史收益调整 (元)</label>
          <input type="number" class="form-input" id="fundProfit" placeholder="用于修正分红等，默认为0" step="0.01">
          <div class="form-hint">如有分红再投入或特殊情况，可手动调整</div>
        </div>

        <div class="form-btn-group">
          <button type="button" class="btn btn-cancel" id="cancelFundBtn">取消</button>
          <button type="submit" class="btn btn-submit" id="fundSubmitBtn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ========== 全局变量 ==========
    const API = 'http://localhost:3801/api';
    let currentAccount = null;
    let accountsData = [];
    let overviewData = null;
    let selectedFund = null;
    let searchTimeout = null;
    let networthTimeout = null;

    // ========== 工具函数 ==========
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function fmtMoney(n) { return (n >= 0 ? '+' : '') + n.toFixed(2); }
    function fmtRate(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

    // ========== DOM 元素 ==========
    const elements = {
      accountList: document.getElementById('accountList'),
      fundList: document.getElementById('fundList'),
      accountModal: document.getElementById('accountModal'),
      fundModal: document.getElementById('fundModal'),
      accountForm: document.getElementById('accountForm'),
      fundForm: document.getElementById('fundForm'),
      searchDropdown: document.getElementById('searchDropdown'),
      searchInput: document.getElementById('fundSearchInput'),
      selectedFundDisplay: document.getElementById('selectedFundDisplay'),
      sharesPreview: document.getElementById('sharesPreview'),
      networthStatus: document.getElementById('networthStatus'),
    };

    // ========== 净值状态显示 ==========
    function showNetworthStatus(type, message) {
      elements.networthStatus.className = 'networth-status ' + type;
      elements.networthStatus.textContent = message;
    }

    function hideNetworthStatus() {
      elements.networthStatus.className = 'networth-status';
      elements.networthStatus.style.display = 'none';
    }

    // ========== 获取历史净值 ==========
    async function fetchNetworth(code, date) {
      if (!code || !date) return;

      showNetworthStatus('loading', '正在获取净值...');

      try {
        const res = await fetch(`${API}/fund/networth?code=${code}&date=${date}`);
        const result = await res.json();

        if (result.success && result.data) {
          const data = result.data;
          document.getElementById('buyNetWorth').value = data.netWorth.toFixed(4);
          
          if (data.isToday) {
            showNetworthStatus('success', `📈 今日净值: ${data.netWorth.toFixed(4)} (估算值)`);
          } else if (data.note) {
            showNetworthStatus('warning', `📅 ${data.date} 净值: ${data.netWorth.toFixed(4)} (${data.note})`);
          } else {
            showNetworthStatus('success', `📅 ${data.date} 净值: ${data.netWorth.toFixed(4)}`);
          }
          
          updateSharesPreview();
        } else {
          document.getElementById('buyNetWorth').value = '1.0000';
          showNetworthStatus('error', '获取净值失败，将使用默认值1.0');
          updateSharesPreview();
        }
      } catch (error) {
        console.error('获取净值失败:', error);
        document.getElementById('buyNetWorth').value = '1.0000';
        showNetworthStatus('error', '网络错误，使用默认值1.0');
        updateSharesPreview();
      }
    }

    // ========== 基金搜索 ==========
    async function searchFunds(keyword) {
      const dropdown = elements.searchDropdown;
      
      if (!keyword || keyword.length < 1) {
        dropdown.classList.remove('show');
        return;
      }

      dropdown.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      dropdown.classList.add('show');

      try {
        const res = await fetch(`${API}/fund/search?keyword=${encodeURIComponent(keyword)}`);
        const result = await res.json();
        
        if (!result.success || !result.data || result.data.length === 0) {
          dropdown.innerHTML = '<div class="search-empty">未找到相关基金</div>';
          return;
        }

        dropdown.innerHTML = result.data.map(f => {
          const isUp = f.dailyGrowth >= 0;
          return `
            <div class="search-item" data-fund='${JSON.stringify(f).replace(/'/g, "&#39;")}'>
              <div class="search-item-left">
                <div class="search-item-name">${f.name}</div>
                <div class="search-item-code">${f.code}</div>
              </div>
              <div class="search-item-right">
                <div class="search-item-networth">净值: ${f.netWorth.toFixed(4)}</div>
                <div class="search-item-rate ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${f.dailyGrowth.toFixed(2)}%</div>
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error('搜索失败:', error);
        dropdown.innerHTML = '<div class="search-empty">搜索失败</div>';
      }
    }

    function selectFund(fund) {
      selectedFund = fund;
      
      document.getElementById('fundCode').value = fund.code;
      elements.searchInput.value = fund.name;
      
      elements.selectedFundDisplay.style.display = 'flex';
      document.getElementById('selectedFundName').textContent = fund.name;
      document.getElementById('selectedFundCode').textContent = fund.code;
      
      const changeEl = document.getElementById('selectedFundChange');
      const isUp = fund.dailyGrowth >= 0;
      changeEl.textContent = `${isUp ? '+' : ''}${fund.dailyGrowth.toFixed(2)}%`;
      changeEl.className = `selected-fund-change ${isUp ? 'up' : 'down'}`;
      
      elements.searchDropdown.classList.remove('show');
      
      // 自动获取净值
      const date = document.getElementById('fundDate').value;
      if (date) {
        fetchNetworth(fund.code, date);
      }
    }

    function clearSelectedFund() {
      selectedFund = null;
      document.getElementById('fundCode').value = '';
      elements.searchInput.value = '';
      elements.selectedFundDisplay.style.display = 'none';
      document.getElementById('buyNetWorth').value = '';
      hideNetworthStatus();
      updateSharesPreview();
    }

    function updateSharesPreview() {
      const buyAmount = parseFloat(document.getElementById('buyAmount').value) || 0;
      const buyNetWorth = parseFloat(document.getElementById('buyNetWorth').value) || 1;
      
      const shares = buyNetWorth > 0 ? buyAmount / buyNetWorth : 0;
      elements.sharesPreview.innerHTML = `📊 预计持有份额：<span>${shares.toFixed(2)}</span> 份`;
    }

    // ========== 账户操作 ==========
    function openAccountModal(mode, account = null) {
      elements.accountModal.classList.add('active');
      document.getElementById('editAccountId').value = '';
      document.getElementById('accountName').value = '';
      document.getElementById('accountDesc').value = '';
      
      if (mode === 'edit' && account) {
        document.getElementById('accountModalTitle').textContent = '编辑账户';
        document.getElementById('accountSubmitBtn').textContent = '保存';
        document.getElementById('editAccountId').value = account.id;
        document.getElementById('accountName').value = account.name;
        document.getElementById('accountDesc').value = account.description || '';
      } else {
        document.getElementById('accountModalTitle').textContent = '新增账户';
        document.getElementById('accountSubmitBtn').textContent = '创建';
      }
    }

    function closeAccountModal() {
      elements.accountModal.classList.remove('active');
    }

    async function saveAccount(data) {
      const id = document.getElementById('editAccountId').value;
      const url = id ? `${API}/accounts/${id}` : `${API}/accounts`;
      const method = id ? 'PUT' : 'POST';
      
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      const result = await res.json();
      if (!result.success) throw new Error(result.message);
      return result;
    }

    async function deleteAccount(id) {
      if (!confirm('确定删除该账户？所有持仓数据将一并删除！')) return;
      
      const res = await fetch(`${API}/accounts/${id}`, { method: 'DELETE' });
      const result = await res.json();
      if (!result.success) throw new Error(result.message);
      return result;
    }

    // ========== 基金操作 ==========
    function openFundModal(fund = null) {
      elements.fundModal.classList.add('active');
      
      // 重置表单
      document.getElementById('editFundId').value = '';
      document.getElementById('fundCode').value = '';
      elements.searchInput.value = '';
      elements.selectedFundDisplay.style.display = 'none';
      document.getElementById('buyAmount').value = '';
      document.getElementById('buyNetWorth').value = '';
      document.getElementById('fundProfit').value = '';
      document.getElementById('fundDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('before315').checked = true;
      selectedFund = null;
      hideNetworthStatus();
      updateSharesPreview();
      
      if (fund) {
        document.getElementById('fundModalTitle').textContent = '编辑基金';
        document.getElementById('fundSubmitBtn').textContent = '保存';
        document.getElementById('editFundId').value = fund.id;
        
        selectedFund = {
          code: fund.fund_code || '',
          name: fund.fund_name,
          netWorth: fund.buy_net_worth || 1,
          dailyGrowth: 0
        };
        
        document.getElementById('fundCode').value = selectedFund.code;
        elements.searchInput.value = selectedFund.name;
        
        elements.selectedFundDisplay.style.display = 'flex';
        document.getElementById('selectedFundName').textContent = selectedFund.name;
        document.getElementById('selectedFundCode').textContent = selectedFund.code || '-';
        document.getElementById('selectedFundChange').textContent = '-';
        document.getElementById('selectedFundChange').className = 'selected-fund-change';
        
        document.getElementById('buyAmount').value = fund.buy_amount || '';
        document.getElementById('buyNetWorth').value = fund.buy_net_worth ? fund.buy_net_worth.toFixed(4) : '';
        document.getElementById('fundProfit').value = fund.profit || '';
        document.getElementById('fundDate').value = fund.purchase_date || '';
        document.getElementById('before315').checked = fund.before_315 !== false;
        
        showNetworthStatus('success', `📅 买入净值: ${fund.buy_net_worth ? fund.buy_net_worth.toFixed(4) : '-'}`);
        updateSharesPreview();
      } else {
        document.getElementById('fundModalTitle').textContent = '添加基金';
        document.getElementById('fundSubmitBtn').textContent = '添加';
      }
    }

    function closeFundModal() {
      elements.fundModal.classList.remove('active');
    }

    async function saveHolding(data) {
      const id = document.getElementById('editFundId').value;
      const url = id ? `${API}/holdings/${id}` : `${API}/holdings`;
      const method = id ? 'PUT' : 'POST';
      
      if (!id) {
        data.account_id = currentAccount.id;
      }
      
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      const result = await res.json();
      if (!result.success) throw new Error(result.message);
      return result;
    }

    async function deleteHolding(id) {
      if (!confirm('确定删除这只基金？')) return;
      
      const res = await fetch(`${API}/holdings/${id}`, { method: 'DELETE' });
      const result = await res.json();
      if (!result.success) throw new Error(result.message);
      return result;
    }

    // ========== 选择账户（支持点击取消选择）==========
    function selectAccount(accountId) {
      // 如果点击的是已选中的账户，则取消选择
      if (currentAccount && currentAccount.id === accountId) {
        currentAccount = null;
      } else {
        currentAccount = accountsData.find(a => a.id === accountId) || null;
      }
      renderAccounts();
      renderOverview();
      renderFunds();
    }

    // ========== 渲染函数 ==========
    function renderAccounts() {
      if (accountsData.length === 0) {
        elements.accountList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📁</div>
            <div class="empty-text">暂无账户</div>
            <div class="empty-hint">点击上方创建</div>
          </div>`;
        return;
      }

      elements.accountList.innerHTML = accountsData.map(acc => {
        const isActive = currentAccount && currentAccount.id === acc.id;
        // 当日收益：涨红跌绿
        const todayClass = acc.todayProfit >= 0 ? '' : 'negative';
        return `
          <div class="account-item ${isActive ? 'active' : ''}" data-account-id="${acc.id}">
            <div class="account-item-content">
              <div class="account-header">
                <div class="account-name">${isActive ? '✓ ' : ''}${acc.name}</div>
                <div class="account-today ${todayClass}">${fmtMoney(acc.todayProfit)}</div>
              </div>
              <div class="account-stats">
                投入 ${(acc.totalInvestment || 0).toFixed(0)} 元 · ${acc.holdings ? acc.holdings.length : 0} 只 · 累计${fmtMoney(acc.totalProfit)}
              </div>
              <div class="account-actions">
                <button class="account-action-btn" data-edit-account='${JSON.stringify(acc).replace(/'/g, "&#39;")}'>✏️ 编辑</button>
                <button class="account-action-btn delete" data-delete-account-id="${acc.id}">🗑️ 删除</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function renderOverview() {
      const s = overviewData ? overviewData.summary : { 
        totalInvestment: 0, 
        totalCurrentValue: 0, 
        totalProfit: 0, 
        todayProfit: 0, 
        totalProfitRate: 0, 
        todayProfitRate: 0, 
        updateTime: '',
        todayDate: ''
      };

      const data = currentAccount || s;

      document.getElementById('currentAccountName').textContent = 
        currentAccount ? `📁 ${currentAccount.name}` : '📊 总收益概览';
      
      // 当日收益（涨红跌绿）
      document.getElementById('todayProfitAmount').textContent = fmtMoney(data.todayProfit || 0);
      document.getElementById('todayProfitAmount').className = 'section-amount' + ((data.todayProfit || 0) < 0 ? ' negative' : '');
      document.getElementById('todayProfitRate').textContent = fmtRate(data.todayProfitRate || 0);
      
      // 显示日期
      const todayDate = s.todayDate || new Date().toLocaleDateString('zh-CN');
      document.getElementById('todayProfitDate').textContent = todayDate;
      
      // 累计收益（涨红跌绿）
      document.getElementById('totalProfitAmount').textContent = fmtMoney(data.totalProfit || 0);
      document.getElementById('totalProfitAmount').className = 'section-amount' + ((data.totalProfit || 0) < 0 ? ' negative' : '');
      document.getElementById('totalProfitRate').textContent = fmtRate(data.profitRate || 0);
      
      // 所有账户当日总收益
      const allTodayProfit = accountsData.reduce((sum, acc) => sum + (acc.todayProfit || 0), 0);
      const allTodayInvestment = accountsData.reduce((sum, acc) => sum + (acc.totalInvestment || 0), 0);
      const allTodayProfitRate = allTodayInvestment > 0 ? (allTodayProfit / allTodayInvestment) * 100 : 0;
      
      document.getElementById('allTodayProfitAmount').textContent = fmtMoney(allTodayProfit);
      document.getElementById('allTodayProfitAmount').className = 'section-amount' + (allTodayProfit < 0 ? ' negative' : '');
      document.getElementById('allTodayProfitRate').textContent = fmtRate(allTodayProfitRate);
      
      document.getElementById('totalInvestment').textContent = (data.totalInvestment || 0).toFixed(2);
      document.getElementById('totalCurrentValue').textContent = (data.totalCurrentValue || 0).toFixed(2);
      document.getElementById('totalHoldings').textContent = currentAccount ? 
        (currentAccount.holdings ? currentAccount.holdings.length : 0) : (s.holdingsCount || 0);
      
      document.getElementById('updateTime').textContent = s.updateTime || new Date().toLocaleTimeString();
    }

    function renderFunds() {
      if (!currentAccount) {
        elements.fundList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-text">选择一个账户</div>
            <div class="empty-hint">查看该账户的持仓明细</div>
          </div>`;
        return;
      }

      const holdings = currentAccount.holdings || [];
      if (holdings.length === 0) {
        elements.fundList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-text">该账户暂无持仓</div>
            <div class="empty-hint">点击上方添加基金</div>
          </div>`;
        return;
      }

      elements.fundList.innerHTML = holdings.map(h => {
        // 累计收益：涨红跌绿
        const profitClass = (h.totalProfit || 0) >= 0 ? '' : 'negative';
        // 当日收益：涨红跌绿
        const todayClass = (h.todayProfit || 0) >= 0 ? '' : 'negative';
        const confirmText = h.before_315 ? '当日确认' : 'T+1确认';
        const isConfirmed = h.isConfirmed !== false;
        
        return `
          <div class="fund-card ${!isConfirmed ? 'unconfirmed' : ''}">
            <div class="fund-info">
              <div class="fund-name">${h.fund_name}</div>
              <div class="fund-meta">
                <span>📅 ${h.purchase_date || '未设置'}</span>
                <span>⏰ ${confirmText}</span>
                ${!isConfirmed ? '<span style="color:#ff9800;">⏳ 待确认</span>' : ''}
              </div>
              <div class="fund-details">
                买入 ${(h.buy_amount || 0).toFixed(2)} 元 × ${(h.buy_net_worth || 1).toFixed(4)} = ${(h.shares || 0).toFixed(2)} 份
              </div>
              ${h.price ? `<div class="fund-networth">
                净值: 昨日 ${(h.yesterdayNetWorth || 0).toFixed(4)} → 今日 ${(h.currentNetWorth || 0).toFixed(4)} | 更新: ${h.price.updateTime || '--'}
              </div>` : ''}
            </div>
            <div class="fund-today">
              <div class="fund-today-amount ${todayClass}">${fmtMoney(h.todayProfit || 0)}</div>
              <div class="fund-today-label">当日收益</div>
            </div>
            <div class="fund-profit">
              <div class="fund-profit-amount ${profitClass}">${fmtMoney(h.totalProfit || 0)}</div>
              <div class="fund-profit-rate">${fmtRate(h.profitRate || 0)}</div>
            </div>
            <div class="fund-actions">
              <button class="fund-action-btn" data-edit='${JSON.stringify(h).replace(/'/g, "&#39;")}'>✏️</button>
              <button class="fund-action-btn delete" data-delete-id="${h.id}">🗑️</button>
            </div>
          </div>`;
      }).join('');
    }

    // ========== 数据加载 ==========
    async function loadData() {
      try {
        const res = await fetch(`${API}/overview`);
        const result = await res.json();
        if (result.success) {
          overviewData = result.data;
          accountsData = result.data.accounts || [];
          if (currentAccount) {
            currentAccount = accountsData.find(a => a.id === currentAccount.id) || null;
          }
        }
      } catch (err) {
        console.error('加载失败:', err);
        showToast('加载数据失败，请刷新重试');
        overviewData = null;
        accountsData = [];
        currentAccount = null;
      }
      renderAccounts();
      renderOverview();
      renderFunds();
    }

    // ========== 事件绑定 ==========
    document.addEventListener('DOMContentLoaded', () => {
      
      // 添加账户按钮
      document.getElementById('addAccountBtn').addEventListener('click', () => openAccountModal('add'));
      document.getElementById('cancelAccountBtn').addEventListener('click', closeAccountModal);
      
      // 账户表单提交
      elements.accountForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('accountName').value.trim();
        const description = document.getElementById('accountDesc').value.trim();
        
        if (!name) {
          showToast('请输入账户名称');
          return;
        }
        
        try {
          await saveAccount({ name, description });
          showToast('✅ 保存成功');
          closeAccountModal();
          await loadData();
        } catch (err) {
          showToast('❌ 保存失败: ' + err.message);
        }
      });

      // 账户列表操作
      elements.accountList.addEventListener('click', async (e) => {
        // 编辑账户
        const editBtn = e.target.closest('[data-edit-account]');
        if (editBtn) {
          try {
            const account = JSON.parse(editBtn.dataset.editAccount);
            openAccountModal('edit', account);
          } catch (err) {
            console.error('解析账户数据失败:', err);
          }
          return;
        }
        
        // 删除账户
        const deleteBtn = e.target.closest('[data-delete-account-id]');
        if (deleteBtn) {
          const id = deleteBtn.dataset.deleteAccountId;
          try {
            await deleteAccount(id);
            showToast('🗑️ 已删除');
            if (currentAccount && currentAccount.id === id) {
              currentAccount = null;
            }
            await loadData();
          } catch (err) {
            showToast('❌ 删除失败: ' + err.message);
          }
          return;
        }
        
        // 选择账户
        const item = e.target.closest('.account-item');
        if (item) {
          const id = item.dataset.accountId;
          if (id) selectAccount(id);
        }
      });

      // 添加基金按钮
      document.getElementById('addFundBtn').addEventListener('click', () => {
        if (!currentAccount) {
          showToast('请先选择账户');
          return;
        }
        openFundModal();
      });
      document.getElementById('cancelFundBtn').addEventListener('click', closeFundModal);
      
      // 基金搜索输入
      elements.searchInput.addEventListener('input', (e) => {
        const value = e.target.value.trim();
        clearTimeout(searchTimeout);
        
        if (!value) {
          elements.searchDropdown.classList.remove('show');
          clearSelectedFund();
          return;
        }
        
        if (selectedFund && value !== selectedFund.name) {
          clearSelectedFund();
        }
        
        searchTimeout = setTimeout(() => searchFunds(value), 300);
      });

      // 搜索结果点击
      elements.searchDropdown.addEventListener('click', (e) => {
        const item = e.target.closest('.search-item');
        if (item) {
          try {
            const fund = JSON.parse(item.dataset.fund);
            selectFund(fund);
          } catch (err) {
            console.error('解析基金数据失败:', err);
          }
        }
      });

      // 移除选中基金
      document.getElementById('removeSelectedFund').addEventListener('click', clearSelectedFund);

      // 购买日期变更 - 自动获取净值
      document.getElementById('fundDate').addEventListener('change', (e) => {
        const date = e.target.value;
        const code = document.getElementById('fundCode').value;
        
        clearTimeout(networthTimeout);
        networthTimeout = setTimeout(() => {
          if (code && date) {
            fetchNetworth(code, date);
          }
        }, 500);
      });

      // 份额预览更新
      document.getElementById('buyAmount').addEventListener('input', updateSharesPreview);

      // 基金表单提交
      elements.fundForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fund_name = selectedFund ? selectedFund.name : elements.searchInput.value.trim();
        const fund_code = document.getElementById('fundCode').value;
        const buy_amount = parseFloat(document.getElementById('buyAmount').value) || 0;
        let buy_net_worth = parseFloat(document.getElementById('buyNetWorth').value) || 1;
        
        if (!fund_name) {
          showToast('请选择基金');
          return;
        }
        
        if (buy_amount <= 0) {
          showToast('请输入买入金额');
          return;
        }
        
        const profit = parseFloat(document.getElementById('fundProfit').value) || 0;
        const purchase_date = document.getElementById('fundDate').value;
        const before_315 = document.getElementById('before315').checked;
        
        try {
          await saveHolding({
            fund_code,
            fund_name,
            buy_amount,
            buy_net_worth,
            profit,
            purchase_date,
            before_315
          });
          showToast('✅ 保存成功');
          closeFundModal();
          await loadData();
        } catch (err) {
          showToast('❌ 保存失败: ' + err.message);
        }
      });

      // 基金列表点击
      elements.fundList.addEventListener('click', async (e) => {
        const editBtn = e.target.closest('[data-edit]');
        const deleteBtn = e.target.closest('[data-delete-id]');
        
        if (editBtn) {
          try {
            const fund = JSON.parse(editBtn.dataset.edit);
            openFundModal(fund);
          } catch (err) {
            console.error('解析基金数据失败:', err);
          }
        }
        
        if (deleteBtn) {
          const id = deleteBtn.dataset.deleteId;
          try {
            await deleteHolding(id);
            showToast('🗑️ 已删除');
            await loadData();
          } catch (err) {
            showToast('❌ 删除失败: ' + err.message);
          }
        }
      });

      // 模态框关闭
      elements.accountModal.addEventListener('click', (e) => {
        if (e.target === elements.accountModal) closeAccountModal();
      });
      elements.fundModal.addEventListener('click', (e) => {
        if (e.target === elements.fundModal) closeFundModal();
      });

      // 页面其他区域关闭搜索下拉
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.fund-search-wrapper') && !e.target.closest('.search-dropdown')) {
          elements.searchDropdown.classList.remove('show');
        }
      });

      // 初始加载
      loadData();
      
      // 每10分钟全量刷新
      setInterval(loadData, 10 * 60 * 1000);
      
      // 每30秒刷新当日收益（快速刷新）
      setInterval(async () => {
        try {
          const res = await fetch(`${API}/overview`);
          const result = await res.json();
          if (result.success) {
            overviewData = result.data;
            accountsData = result.data.accounts || [];
            if (currentAccount) {
              currentAccount = accountsData.find(a => a.id === currentAccount.id) || null;
            }
            renderAccounts();
            renderOverview();
            renderFunds();
          }
        } catch (err) {
          console.error('刷新当日收益失败:', err);
        }
      }, 30 * 1000);
    });
  </script>
</body>
</html>
