<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基金收益 - 账户分组管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: #fff;
      transition: background-color 0.5s ease;
    }
    
    /* 同花顺风格涨跌颜色 */
    :root {
      --up-color: #ff4d4d;      /* 涨 - 红色 */
      --down-color: #00b566;   /* 跌 - 绿色 */
      --neutral-color: #666;
      --bg-default: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --bg-up: linear-gradient(135deg, #4a1515 0%, #3d1010 100%);
      --bg-down: linear-gradient(135deg, #0a2a1a 0%, #0a2015 100%);
      --bg-hot: linear-gradient(135deg, #8b0000 0%, #5c0000 100%);
      --gold-color: #ffd700;
      --fire-color: #ff6600;
    }
    
    body.up { background: var(--bg-up); }
    body.down { background: var(--bg-down); }
    body.hot { background: var(--bg-hot); }

    @keyframes hotPulse {
      0%, 100% { background: linear-gradient(135deg, #8b0000 0%, #5c0000 100%); }
      25% { background: linear-gradient(135deg, #a31515 0%, #6e0808 100%); }
      50% { background: linear-gradient(135deg, #b52020 0%, #7f0f0f 100%); }
      75% { background: linear-gradient(135deg, #a31515 0%, #6e0808 100%); }
    }
    
    body.hot {
      animation: hotPulse 1.5s infinite ease-in-out;
    }

    /* 屏幕震动效果 */
    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-3px, -2px); }
      20% { transform: translate(3px, 2px); }
      30% { transform: translate(-2px, 3px); }
      40% { transform: translate(2px, -3px); }
      50% { transform: translate(-3px, 2px); }
      60% { transform: translate(3px, -2px); }
      70% { transform: translate(-2px, -3px); }
      80% { transform: translate(2px, 3px); }
      90% { transform: translate(-3px, -2px); }
    }
    
    body.hot-shake {
      animation: screenShake 0.6s ease-in-out;
    }

    /* 爆燃动画容器 */
    .fireworks {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    
    /* 烟花粒子 */
    .spark {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: sparkFly 2.5s ease-out forwards;
      box-shadow: 0 0 10px currentColor;
    }
    
    @keyframes sparkFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
        box-shadow: 0 0 20px currentColor;
      }
      50% {
        opacity: 1;
        box-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0;
        box-shadow: 0 0 5px currentColor;
      }
    }
    
    /* 金色粒子 */
    .gold-spark {
      position: absolute;
      width: 10px; height: 10px;
      background: var(--gold-color);
      border-radius: 50%;
      animation: goldSparkFly 3s ease-out forwards;
      box-shadow: 0 0 15px var(--gold-color), 0 0 30px var(--gold-color);
    }
    
    @keyframes goldSparkFly {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0) rotate(720deg);
        opacity: 0;
      }
    }
    
    /* 彩带 */
    .confetti {
      position: absolute;
      width: 12px; height: 12px;
      animation: confettiFall 4s ease-out forwards;
    }
    
    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(1080deg);
        opacity: 0;
      }
    }
    
    /* 火焰文字效果 */
    .flame-text {
      position: relative;
    }
    
    .flame-text::before {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      color: #ff6600;
      filter: blur(8px);
      animation: flameFlicker 0.3s infinite alternate;
      z-index: -1;
    }
    
    @keyframes flameFlicker {
      0% { opacity: 0.8; transform: scaleY(1) translateX(-1px); }
      100% { opacity: 1; transform: scaleY(1.1) translateX(1px); }
    }
    
    /* 数字滚动动画 */
    .counting {
      display: inline-block;
      animation: countPop 0.3s ease-out;
    }
    
    @keyframes countPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    
    /* 热点光环 */
    .hot-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,102,0,0.3) 0%, transparent 70%);
      animation: hotGlow 1s infinite;
      pointer-events: none;
      z-index: 9998;
    }
    
    @keyframes hotGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
    }

    .app-container { display: flex; min-height: 100vh; }

    /* 左侧边栏 */
    .sidebar {
      width: 280px;
      background: rgba(0, 0, 0, 0.3);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
    }

    .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .sidebar-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

    .add-account-btn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--up-color) 0%, #ff6b6b 100%);
      border: none; border-radius: 8px;
      color: white; font-size: 13px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .add-account-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
    }

    .account-list { flex: 1; overflow-y: auto; padding: 10px; }

    .account-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }
    
    .account-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      transition: background-color 0.3s;
    }
    
    .account-item.up::before { background: var(--up-color); }
    .account-item.down::before { background: var(--down-color); }
    .account-item.neutral::before { background: var(--neutral-color); }

    .account-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(3px); }
    .account-item.active { 
      border-color: #fff; 
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
    
    .account-item.hot {
      animation: accountHot 0.4s infinite;
      border-color: var(--gold-color);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 102, 0, 0.3);
    }

    @keyframes accountHot {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
      50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(255, 215, 0, 0.9); }
    }

    .account-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .account-name { font-size: 14px; font-weight: 600; flex: 1; cursor: pointer; }
    .account-today { 
      font-size: 16px; font-weight: bold; 
      padding: 4px 10px;
      border-radius: 20px;
      transition: all 0.3s;
    }
    .account-today.up { color: #fff; background: var(--up-color); }
    .account-today.down { color: #fff; background: var(--down-color); }
    .account-today.neutral { color: #fff; background: var(--neutral-color); }
    
    .account-today.hot {
      animation: hotBadge 0.3s infinite;
      background: linear-gradient(135deg, var(--gold-color), var(--fire-color));
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 102, 0, 0.5);
      border: 2px solid var(--gold-color);
    }
    
    @keyframes hotBadge {
      0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
      50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(255, 215, 0, 1); }
    }

    .account-stats { font-size: 11px; opacity: 0.7; display: flex; justify-content: space-between; }
    .account-actions { display: flex; gap: 8px; margin-top: 10px; opacity: 0; transition: opacity 0.2s; }
    .account-item:hover .account-actions { opacity: 1; }
    
    .account-action-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: none;
      font-size: 11px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      flex: 1;
      transition: all 0.2s;
    }
    .account-action-btn:hover { background: rgba(255, 255, 255, 0.25); }
    .account-action-btn.delete { background: rgba(255, 71, 87, 0.3); }
    .account-action-btn.delete:hover { background: rgba(255, 71, 87, 0.5); }

    /* 主内容区 */
    .main-content { flex: 1; margin-left: 280px; padding: 25px; }

    /* 概览卡片 */
    .overview-card {
      border-radius: 16px;
      padding: 20px 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    
    .overview-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.1;
      pointer-events: none;
    }
    
    .overview-card.up { background: linear-gradient(135deg, rgba(255,77,77,0.25), rgba(255,77,77,0.1)); }
    .overview-card.down { background: linear-gradient(135deg, rgba(0,181,102,0.25), rgba(0,181,102,0.1)); }
    .overview-card.neutral { background: linear-gradient(135deg, rgba(102,102,102,0.25), rgba(102,102,102,0.1)); }
    
    .overview-card.hot {
      background: linear-gradient(135deg, rgba(139,0,0,0.6), rgba(255,102,0,0.4));
      animation: cardHot 0.8s infinite;
      box-shadow: 0 0 60px rgba(255, 102, 0, 0.6), 0 0 100px rgba(139,0,0,0.4);
    }
    
    @keyframes cardHot {
      0%, 100% { 
        box-shadow: 0 0 60px rgba(255, 102, 0, 0.6), 0 0 100px rgba(139,0,0,0.4);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 100px rgba(255, 102, 0, 0.9), 0 0 150px rgba(139,0,0,0.6);
        transform: scale(1.01);
      }
    }

    .overview-header { display: flex; justify-content: space-between; margin-bottom: 25px; }
    .overview-title { font-size: 18px; font-weight: 600; }
    .overview-time { font-size: 12px; opacity: 0.7; }

    /* 收益区域 */
    .profit-section {
      text-align: center;
      padding: 15px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .profit-label { font-size: 14px; margin-bottom: 6px; opacity: 0.9; }
    .profit-amount { 
      font-size: 42px; font-weight: bold; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      transition: all 0.3s;
    }
    .profit-amount.up { color: var(--up-color); }
    .profit-amount.down { color: var(--down-color); }
    .profit-amount.neutral { color: #fff; }
    .profit-amount.hot { 
      color: var(--gold-color);
      animation: hotProfitText 0.4s infinite;
      text-shadow: 0 0 30px var(--gold-color), 0 0 60px var(--fire-color);
    }
    
    @keyframes hotProfitText {
      0%, 100% { transform: scale(1); text-shadow: 0 0 30px var(--gold-color), 0 0 60px var(--fire-color); }
      50% { transform: scale(1.08); text-shadow: 0 0 50px var(--gold-color), 0 0 80px var(--fire-color); }
    }
    
    .profit-rate { font-size: 18px; margin-top: 8px; opacity: 0.8; }
    .profit-rate.up { color: var(--up-color); }
    .profit-rate.down { color: var(--down-color); }

    /* 当日收益 */
    .today-section {
      text-align: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 15px;
    }
    .today-label { font-size: 13px; margin-bottom: 4px; opacity: 0.8; }
    .today-amount { 
      font-size: 28px; font-weight: bold;
      transition: all 0.3s;
    }
    .today-amount.up { color: var(--up-color); }
    .today-amount.down { color: var(--down-color); }
    .today-amount.neutral { color: #fff; }
    .today-amount.hot {
      color: var(--gold-color);
      animation: hotProfitText 0.4s infinite;
      text-shadow: 0 0 30px var(--gold-color), 0 0 60px var(--fire-color);
    }
    .today-rate { font-size: 16px; opacity: 0.8; margin-top: 5px; }
    .today-rate.up { color: var(--up-color); }
    .today-rate.down { color: var(--down-color); }
    .today-rate.hot {
      color: var(--gold-color);
      font-size: 16px;
      font-weight: bold;
      animation: hotRatePulse 0.5s infinite;
    }
    
    @keyframes hotRatePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .stats-row { display: flex; justify-content: space-around; margin-top: 15px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 16px; font-weight: 600; }
    .stat-label { font-size: 11px; opacity: 0.6; margin-top: 3px; }

    /* 基金列表 */
    .fund-section { margin-top: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .section-title { font-size: 16px; font-weight: 600; }

    .add-fund-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--up-color) 0%, #ff6b6b 100%);
      border: none; border-radius: 10px;
      color: white; font-size: 13px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .add-fund-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
    }

    .fund-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
      border-left: 4px solid transparent;
      position: relative;
      overflow: hidden;
    }
    
    .fund-card.up { border-left-color: var(--up-color); }
    .fund-card.down { border-left-color: var(--down-color); }
    .fund-card:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(5px); }
    
    .fund-card.hot {
      border-left-color: var(--gold-color);
      animation: fundHot 0.4s infinite;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    @keyframes fundHot {
      0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
      50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
    }

    .fund-info { flex: 1; }
    .fund-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .fund-meta { font-size: 11px; opacity: 0.6; display: flex; gap: 12px; flex-wrap: wrap; }
    .fund-details { font-size: 12px; opacity: 0.7; margin-top: 4px; }

    .fund-profit, .fund-today { text-align: right; margin-left: 15px; min-width: 90px; }
    .fund-profit-amount, .fund-today-amount { 
      font-size: 16px; font-weight: bold;
      transition: all 0.3s;
    }
    .fund-profit-amount.up, .fund-today-amount.up { color: var(--up-color); }
    .fund-profit-amount.down, .fund-today-amount.down { color: var(--down-color); }
    .fund-profit-amount.neutral, .fund-today-amount.neutral { color: #fff; }
    
    .fund-profit-amount.hot, .fund-today-amount.hot { 
      color: var(--gold-color);
      animation: hotText 0.4s infinite;
      text-shadow: 0 0 15px var(--gold-color);
    }
    
    @keyframes hotText {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .fund-profit-rate, .fund-today-label { font-size: 11px; opacity: 0.6; }

    .fund-actions { display: flex; gap: 6px; }
    .fund-action-btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.2s;
    }
    .fund-action-btn:hover { background: rgba(255, 255, 255, 0.2); }
    .fund-action-btn.delete { background: rgba(255, 71, 87, 0.3); }
    .fund-action-btn.delete:hover { background: rgba(255, 71, 87, 0.5); }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px; opacity: 0.7; }
    .empty-icon { font-size: 56px; margin-bottom: 15px; }
    .empty-text { font-size: 16px; margin-bottom: 8px; }
    .empty-hint { font-size: 13px; opacity: 0.5; }

    /* 模态框 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none; justify-content: center; align-items: center;
      z-index: 1000; backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 20px; padding: 30px;
      width: 90%; max-width: 450px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 25px; text-align: center; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; margin-bottom: 8px; opacity: 0.8; }
    .form-input, .form-select {
      width: 100%; padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white; font-size: 14px;
      transition: all 0.3s;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--up-color); box-shadow: 0 0 15px rgba(255,77,77,0.2); }

    .search-container { position: relative; }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }
    .search-results.active { display: block; }
    .search-item {
      padding: 12px 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      transition: background 0.2s;
    }
    .search-item:hover { background: rgba(255, 77, 77, 0.2); }
    .search-item-code { opacity: 0.5; margin-left: 10px; }
    .search-item-rate { float: right; }
    .search-item-rate.up { color: var(--up-color); }
    .search-item-rate.down { color: var(--down-color); }
    .search-empty { padding: 12px; text-align: center; opacity: 0.5; font-size: 13px; }

    .checkbox-group { display: flex; align-items: center; gap: 10px; }
    .checkbox-input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--up-color); }
    .checkbox-label { font-size: 13px; opacity: 0.8; cursor: pointer; }
    .form-hint { font-size: 11px; opacity: 0.5; margin-top: 6px; }

    .form-btn-group { display: flex; gap: 12px; margin-top: 25px; }
    .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-cancel { background: rgba(255, 255, 255, 0.1); color: white; }
    .btn-cancel:hover { background: rgba(255, 255, 255, 0.2); }
    .btn-submit { background: linear-gradient(135deg, var(--up-color) 0%, #ff6b6b 100%); color: white; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9); color: white; padding: 12px 24px;
      border-radius: 10px; font-size: 14px; z-index: 2000;
      opacity: 0; transition: opacity 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast.show { opacity: 1; }

    /* 加载动画 */
    .loading { text-align: center; padding: 50px; opacity: 0.7; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--up-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 热点提示 */
    .hot-badge {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      font-weight: bold;
      color: var(--gold-color);
      text-shadow: 0 0 60px var(--gold-color), 0 0 100px var(--fire-color), 0 0 150px var(--up-color);
      animation: hotBadgeText 0.4s infinite;
      z-index: 10000;
      pointer-events: none;
      white-space: nowrap;
    }
    
    @keyframes hotBadgeText {
      0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(-2deg); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1.1) rotate(1deg); opacity: 0.9; }
      50% { transform: translate(-50%, -50%) scale(1.2) rotate(-1deg); opacity: 1; }
      75% { transform: translate(-50%, -50%) scale(1.1) rotate(2deg); opacity: 0.9; }
    }
    
    /* 热点副标题 */
    .hot-subtitle {
      position: fixed;
      top: calc(50% + 60px); left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px var(--fire-color);
      animation: subtitleFloat 1s infinite;
      z-index: 10000;
      pointer-events: none;
      white-space: nowrap;
    }
    
    @keyframes subtitleFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="fireworks" id="fireworks"></div>
  
  <div class="app-container">
    <!-- 左侧账户列表 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">📁 账户管理</div>
        <button class="add-account-btn" onclick="openAccountModal('add')">+ 新增账户</button>
      </div>
      <div class="account-list" id="accountList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
      <!-- 概览卡片 -->
      <div class="overview-card" id="overviewCard">
        <div class="overview-header">
          <div class="overview-title" id="currentAccountName">📊 总收益概览</div>
          <div class="overview-time" id="updateTime">--</div>
        </div>

        <!-- 当日收益 -->
        <div class="today-section">
          <div class="today-label">💰 当日收益</div>
          <div class="today-amount" id="todayProfitAmount">+0.00</div>
          <div class="today-rate" id="todayProfitRate">+0.00%</div>
        </div>

        <!-- 累计收益 -->
        <div class="profit-section">
          <div class="profit-label">📈 累计收益 (含当日)</div>
          <div class="profit-amount" id="totalProfitAmount">+0.00</div>
          <div class="profit-rate" id="totalProfitRate">+0.00%</div>
        </div>

        <!-- 统计 -->
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-value" id="totalCost">0.00</div>
            <div class="stat-label">持有金额</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalValue">0.00</div>
            <div class="stat-label">当前市值</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalHoldings">0</div>
            <div class="stat-label">持仓数</div>
          </div>
        </div>
      </div>

      <!-- 基金列表 -->
      <div class="fund-section">
        <div class="section-header">
          <div class="section-title" id="fundSectionTitle">💼 持仓明细</div>
          <button class="add-fund-btn" onclick="openFundModal()">+ 添加基金</button>
        </div>
        <div id="fundList">
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-text">选择一个账户</div>
            <div class="empty-hint">或新增一个账户开始管理</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 账户模态框 -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal">
      <div class="modal-title" id="accountModalTitle">新增账户</div>
      <form onsubmit="handleAccountSubmit(event)">
        <input type="hidden" id="editAccountId">
        <div class="form-group">
          <label class="form-label">账户名称</label>
          <input type="text" class="form-input" id="accountName" placeholder="例如：支付宝、天天基金" required>
        </div>
        <div class="form-group">
          <label class="form-label">备注（可选）</label>
          <input type="text" class="form-input" id="accountDesc" placeholder="例如：养老计划">
        </div>
        <div class="form-btn-group">
          <button type="button" class="btn btn-cancel" onclick="closeAccountModal()">取消</button>
          <button type="submit" class="btn btn-submit" id="accountSubmitBtn">创建</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 基金模态框 -->
  <div class="modal-overlay" id="fundModal">
    <div class="modal">
      <div class="modal-title" id="fundModalTitle">添加基金</div>
      <form onsubmit="handleFundSubmit(event)">
        <input type="hidden" id="editFundId">
        <input type="hidden" id="fundCode">

        <div class="form-group">
          <label class="form-label">基金名称</label>
          <div class="search-container">
            <input type="text" class="form-input" id="fundName" placeholder="搜索基金名称..." autocomplete="off">
            <div class="search-results" id="searchResults"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">持有金额 (元)</label>
          <input type="number" class="form-input" id="fundCost" placeholder="例如：10000" step="0.01" required>
        </div>

        <div class="form-group">
          <label class="form-label">累计收益 (元)</label>
          <input type="number" class="form-input" id="fundProfit" placeholder="例如：500 (亏损填负数)" step="0.01">
        </div>

        <div class="form-group">
          <label class="form-label">购买日期</label>
          <div style="display: flex; align-items: center; gap: 12px;">
            <input type="date" class="form-input" id="fundDate" style="flex: 1;">
            <div class="checkbox-group" style="white-space: nowrap;">
              <input type="checkbox" id="before315" class="checkbox-input" checked>
              <label for="before315" class="checkbox-label">15:00前</label>
            </div>
          </div>
          <div class="form-hint">勾选"15:00前"则当日确认，否则T+1确认</div>
        </div>

        <div class="form-btn-group">
          <button type="button" class="btn btn-cancel" onclick="closeFundModal()">取消</button>
          <button type="submit" class="btn btn-submit" id="fundSubmitBtn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:3801/api';
    let currentAccount = null;
    let accountsData = [];
    let overviewData = null;
    let searchTimeout = null;
    let isHotShown = false;

    // 判断涨跌状态
    function getStatus(value) {
      if (value > 0) return 'up';
      if (value < 0) return 'down';
      return 'neutral';
    }

    // 判断是否热点（超过7%）
    function isHot(rate) {
      return rate >= 7;
    }

    // 格式化金额
    function fmtMoney(n) { return (n >= 0 ? '+' : '') + n.toFixed(2); }
    function fmtRate(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

    // 创建烟花效果
    function createFireworks() {
      const container = document.getElementById('fireworks');
      const colors = ['#ff4d4d', '#ff6b6b', '#ff6600', '#ffcc00', '#fff', '#ffd700', '#ff4500'];
      
      // 多波烟花
      for (let wave = 0; wave < 3; wave++) {
        setTimeout(() => {
          for (let i = 0; i < 30; i++) {
            setTimeout(() => {
              const spark = document.createElement('div');
              spark.className = 'spark';
              spark.style.left = Math.random() * window.innerWidth + 'px';
              spark.style.top = Math.random() * (window.innerHeight * 0.7) + 'px';
              spark.style.background = colors[Math.floor(Math.random() * colors.length)];
              spark.style.setProperty('--dx', (Math.random() - 0.5) * 500 + 'px');
              spark.style.setProperty('--dy', (Math.random() - 0.5) * 500 + 'px');
              container.appendChild(spark);
              setTimeout(() => spark.remove(), 2500);
            }, i * 20);
          }
        }, wave * 800);
      }
    }

    // 创建金色粒子
    function createGoldParticles() {
      const container = document.getElementById('fireworks');
      
      for (let wave = 0; wave < 2; wave++) {
        setTimeout(() => {
          for (let i = 0; i < 20; i++) {
            setTimeout(() => {
              const spark = document.createElement('div');
              spark.className = 'gold-spark';
              spark.style.left = Math.random() * window.innerWidth + 'px';
              spark.style.top = Math.random() * (window.innerHeight * 0.5) + 'px';
              spark.style.setProperty('--dx', (Math.random() - 0.5) * 600 + 'px');
              spark.style.setProperty('--dy', (Math.random() - 0.5) * 600 + 'px');
              container.appendChild(spark);
              setTimeout(() => spark.remove(), 3000);
            }, i * 50);
          }
        }, wave * 1000);
      }
    }

    // 创建彩带效果
    function createConfetti() {
      const container = document.getElementById('fireworks');
      const colors = ['#ff4d4d', '#00b566', '#ffcc00', '#ff6600', '#00bfff', '#ffd700'];
      const shapes = ['50%', '0', '2px'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.top = '-20px';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
          confetti.style.width = (Math.random() * 10 + 8) + 'px';
          confetti.style.height = (Math.random() * 10 + 8) + 'px';
          container.appendChild(confetti);
          setTimeout(() => confetti.remove(), 4000);
        }, i * 60);
      }
    }

    // 显示热点光环
    function showHotGlow() {
      const existing = document.querySelector('.hot-glow');
      if (existing) existing.remove();
      
      const glow = document.createElement('div');
      glow.className = 'hot-glow';
      document.body.appendChild(glow);
      
      setTimeout(() => glow.remove(), 5000);
    }

    // 触发屏幕震动
    function triggerScreenShake() {
      document.body.classList.add('hot-shake');
      setTimeout(() => document.body.classList.remove('hot-shake'), 600);
    }

    // 显示热点提示
    function showHotBadge(rate) {
      if (isHotShown) return;
      isHotShown = true;
      
      // 触发多种效果
      triggerScreenShake();
      showHotGlow();
      createFireworks();
      createGoldParticles();
      createConfetti();
      
      // 创建主徽章
      const badge = document.createElement('div');
      badge.className = 'hot-badge';
      badge.textContent = '🔥 大涨!';
      document.body.appendChild(badge);
      
      // 创建副标题
      const subtitle = document.createElement('div');
      subtitle.className = 'hot-subtitle';
      subtitle.textContent = `今日收益率 +${rate.toFixed(2)}% 🎉`;
      document.body.appendChild(subtitle);
      
      // 持续显示后移除
      setTimeout(() => {
        badge.remove();
        subtitle.remove();
        isHotShown = false;
      }, 4000);
    }

    // Toast提示
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ========== 基金搜索 ==========
    async function searchFunds(keyword) {
      const results = document.getElementById('searchResults');
      if (!keyword || keyword.length < 1) {
        results.classList.remove('active');
        return;
      }

      try {
        const res = await fetch(`${API}/fund/search?keyword=${encodeURIComponent(keyword)}`);
        const result = await res.json();

        if (result.success && result.data.length > 0) {
          results.innerHTML = result.data.map(f => {
            const rateClass = getStatus(f.dailyGrowth);
            return `
              <div class="search-item" onclick="selectFund('${f.code}', '${f.name.replace(/'/g, "\\'")}')">
                <span>${f.name}</span>
                <span class="search-item-code">${f.code}</span>
                <span class="search-item-rate ${rateClass}">${f.dailyGrowth > 0 ? '+' : ''}${f.dailyGrowth.toFixed(2)}%</span>
              </div>`;
          }).join('');
        } else {
          results.innerHTML = '<div class="search-empty">未找到相关基金</div>';
        }
        results.classList.add('active');
      } catch (e) {
        console.error('搜索失败', e);
      }
    }

    function selectFund(code, name) {
      document.getElementById('fundCode').value = code;
      document.getElementById('fundName').value = name;
      document.getElementById('searchResults').classList.remove('active');
    }

    // ========== 账户操作 ==========
    function openAccountModal(mode, account = null) {
      document.getElementById('accountModal').classList.add('active');
      if (mode === 'add') {
        document.getElementById('accountModalTitle').textContent = '新增账户';
        document.getElementById('accountSubmitBtn').textContent = '创建';
        document.getElementById('editAccountId').value = '';
      } else {
        document.getElementById('accountModalTitle').textContent = '编辑账户';
        document.getElementById('accountSubmitBtn').textContent = '保存';
        document.getElementById('editAccountId').value = account.id;
        document.getElementById('accountName').value = account.name;
        document.getElementById('accountDesc').value = account.description || '';
      }
    }

    function closeAccountModal() {
      document.getElementById('accountModal').classList.remove('active');
      document.getElementById('accountName').value = '';
      document.getElementById('accountDesc').value = '';
    }

    async function handleAccountSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('editAccountId').value;
      const name = document.getElementById('accountName').value.trim();
      const description = document.getElementById('accountDesc').value.trim();

      try {
        if (id) {
          const res = await fetch(`${API}/accounts/${id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description })
          });
          const result = await res.json();
          if (result.success) showToast('✅ 账户已保存');
        } else {
          const res = await fetch(`${API}/accounts`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description })
          });
          const result = await res.json();
          if (result.success) showToast('✅ 账户已创建');
        }
        closeAccountModal();
        loadData();
      } catch (err) { showToast('❌ 操作失败'); }
    }

    async function deleteAccount(id, name) {
      if (!confirm(`确定删除账户"${name}"？`)) return;
      try {
        const res = await fetch(`${API}/accounts/${id}`, { method: 'DELETE' });
        const result = await res.json();
        if (result.success) {
          showToast('🗑️ 已删除');
          if (currentAccount && currentAccount.id === id) currentAccount = null;
          loadData();
        }
      } catch (err) { showToast('❌ 删除失败'); }
    }

    function toggleAccount(account) {
      currentAccount = (currentAccount && currentAccount.id === account.id) ? null : account;
      renderAccounts();
      renderOverview();
      renderFunds();
    }

    // ========== 基金操作 ==========
    function openFundModal(fund = null) {
      if (!currentAccount) { showToast('请先选择账户'); return; }
      document.getElementById('fundModal').classList.add('active');
      document.getElementById('fundDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('before315').checked = true;
      document.getElementById('searchResults').classList.remove('active');

      if (fund) {
        document.getElementById('fundModalTitle').textContent = '编辑基金';
        document.getElementById('fundSubmitBtn').textContent = '保存';
        document.getElementById('editFundId').value = fund.id;
        document.getElementById('fundCode').value = fund.fund_code || '';
        document.getElementById('fundName').value = fund.fund_name;
        document.getElementById('fundCost').value = fund.cost;
        document.getElementById('fundProfit').value = fund.profit;
        document.getElementById('fundDate').value = fund.purchase_date || '';
        document.getElementById('before315').checked = fund.before_315 !== false;
      } else {
        document.getElementById('fundModalTitle').textContent = '添加基金';
        document.getElementById('fundSubmitBtn').textContent = '添加';
        document.getElementById('editFundId').value = '';
        document.getElementById('fundCode').value = '';
        document.getElementById('fundName').value = '';
        document.getElementById('fundCost').value = '';
        document.getElementById('fundProfit').value = '';
      }
    }

    function closeFundModal() {
      document.getElementById('fundModal').classList.remove('active');
    }

    async function handleFundSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('editFundId').value;
      const fund_code = document.getElementById('fundCode').value;
      const fund_name = document.getElementById('fundName').value.trim();
      const cost = parseFloat(document.getElementById('fundCost').value);
      const profit = parseFloat(document.getElementById('fundProfit').value) || 0;
      const purchase_date = document.getElementById('fundDate').value;
      const before_315 = document.getElementById('before315').checked;

      if (!fund_name) { showToast('请选择或输入基金名称'); return; }

      try {
        if (id) {
          const res = await fetch(`${API}/holdings/${id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fund_code, fund_name, cost, profit, purchase_date, before_315 })
          });
          if ((await res.json()).success) showToast('✅ 已保存');
        } else {
          const res = await fetch(`${API}/holdings`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ account_id: currentAccount.id, fund_code, fund_name, cost, profit, purchase_date, before_315 })
          });
          if ((await res.json()).success) showToast('✅ 基金已添加');
        }
        closeFundModal();
        loadData();
      } catch (err) { showToast('❌ 操作失败'); }
    }

    async function deleteFund(id) {
      if (!confirm('确定删除这只基金？')) return;
      try {
        if ((await (await fetch(`${API}/holdings/${id}`, { method: 'DELETE' })).json()).success) {
          showToast('🗑️ 已删除');
          loadData();
        }
      } catch (err) { showToast('❌ 删除失败'); }
    }

    // ========== 渲染 ==========
    function renderAccounts() {
      const list = document.getElementById('accountList');
      if (accountsData.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📁</div>
            <div class="empty-text">暂无账户</div>
            <div class="empty-hint">点击上方创建</div>
          </div>`;
        return;
      }

      list.innerHTML = accountsData.map(acc => {
        const isActive = currentAccount && currentAccount.id === acc.id;
        const status = getStatus(acc.todayProfitRate || acc.todayProfit);
        const hot = isHot(acc.todayProfitRate || acc.todayProfit);
        
        return `
          <div class="account-item ${status} ${isActive ? 'active' : ''} ${hot ? 'hot' : ''}">
            <div class="account-header" onclick="toggleAccount(${JSON.stringify(acc).replace(/"/g, '&quot;')})">
              <div class="account-name">${acc.name} ${isActive ? '✓' : ''}</div>
              <div class="account-today ${status} ${hot ? 'hot' : ''}">${fmtMoney(acc.todayProfit)}</div>
            </div>
            <div class="account-stats">
              <span>持有 ${acc.totalCost.toFixed(0)} 元</span>
              <span>${acc.holdings ? acc.holdings.length : 0} 只基金</span>
            </div>
            <div class="account-actions">
              <button class="account-action-btn" onclick="event.stopPropagation(); openAccountModal('edit', ${JSON.stringify(acc).replace(/"/g, '&quot;')})">✏️ 编辑</button>
              <button class="account-action-btn delete" onclick="event.stopPropagation(); deleteAccount('${acc.id}', '${acc.name.replace(/'/g, "\\'")}')">🗑️ 删除</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderOverview() {
      const s = overviewData ? overviewData.summary : { 
        totalCost: 0, totalValue: 0, totalProfit: 0, todayProfit: 0, 
        todayProfitRate: 0, updateTime: '' 
      };

      const card = document.getElementById('overviewCard');
      let rate = 0;
      
      if (currentAccount) {
        document.getElementById('currentAccountName').textContent = `📁 ${currentAccount.name}`;
        rate = currentAccount.todayProfitRate || 0;
      } else {
        document.getElementById('currentAccountName').textContent = '📊 总收益概览';
        rate = s.todayProfitRate || 0;
      }

      const status = getStatus(rate);
      const hot = isHot(rate);

      // 更新整体背景
      document.body.className = hot ? 'hot' : status;

      // 更新卡片样式
      card.className = 'overview-card ' + status + (hot ? ' hot' : '');

      // 更新当日收益
      const todayEl = document.getElementById('todayProfitAmount');
      todayEl.className = 'today-amount ' + status + (hot ? ' hot' : '');
      todayEl.textContent = fmtMoney(currentAccount ? currentAccount.todayProfit : s.todayProfit);

      const todayRateEl = document.getElementById('todayProfitRate');
      todayRateEl.className = 'today-rate ' + status;
      todayRateEl.textContent = fmtRate(rate);

      // 更新累计收益
      const totalEl = document.getElementById('totalProfitAmount');
      totalEl.className = 'profit-amount ' + status + (hot ? ' hot' : '');
      totalEl.textContent = fmtMoney(currentAccount ? currentAccount.totalProfit : s.totalProfit);

      const totalRateEl = document.getElementById('totalProfitRate');
      totalRateEl.className = 'profit-rate ' + status;
      totalRateEl.textContent = fmtRate(currentAccount ? currentAccount.profitRate : s.totalProfitRate);

      // 统计
      document.getElementById('totalCost').textContent = (currentAccount ? currentAccount.totalCost : s.totalCost).toFixed(2);
      document.getElementById('totalValue').textContent = (currentAccount ? (currentAccount.totalCost + currentAccount.totalProfit) : s.totalValue).toFixed(2);
      document.getElementById('totalHoldings').textContent = currentAccount ? (currentAccount.holdings ? currentAccount.holdings.length : 0) : (s.holdingsCount || 0);
      document.getElementById('updateTime').textContent = s.updateTime || new Date().toLocaleTimeString();

      // 触发热点动画
      if (hot) {
        showHotBadge(rate);
      }
    }

    function renderFunds() {
      const list = document.getElementById('fundList');
      const title = document.getElementById('fundSectionTitle');

      if (!currentAccount) {
        title.textContent = '💼 全部持仓明细';
        const allHoldings = accountsData.flatMap(acc => 
          (acc.holdings || []).map(h => ({ ...h, accountName: acc.name }))
        );
        
        if (allHoldings.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📈</div>
              <div class="empty-text">暂无持仓</div>
              <div class="empty-hint">选择账户后添加基金</div>
            </div>`;
          return;
        }

        list.innerHTML = allHoldings.map(h => renderFundCard(h, true)).join('');
        return;
      }

      title.textContent = `💼 ${currentAccount.name} 持仓明细`;
      const holdings = currentAccount.holdings || [];
      
      if (holdings.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-text">该账户暂无持仓</div>
            <div class="empty-hint">点击上方添加基金</div>
          </div>`;
        return;
      }

      list.innerHTML = holdings.map(h => renderFundCard(h, false)).join('');
    }

    function renderFundCard(h, showAccount) {
      const profitRate = h.cost ? (h.profit / h.cost * 100) : 0;
      const status = getStatus(h.todayProfit);
      const hot = isHot(h.todayProfit);
      const confirmText = h.before_315 ? '当日确认' : 'T+1确认';
      const currentValue = h.currentValue || (h.cost + h.profit);
      
      return `
        <div class="fund-card ${status} ${hot ? 'hot' : ''}">
          <div class="fund-info">
            <div class="fund-name">${h.fund_name} ${showAccount ? `<span style="opacity:0.5;font-size:11px">[${h.accountName}]</span>` : ''}</div>
            <div class="fund-meta">
              <span>📅 ${h.purchase_date || '未设置'}</span>
              <span>⏰ ${confirmText}</span>
              ${h.price ? `<span>🕐 ${h.price.updateTime}</span>` : ''}
            </div>
            <div class="fund-details">持有 ${h.cost.toFixed(0)} 元 → 市值 ${currentValue.toFixed(0)} 元</div>
          </div>
          <div class="fund-today">
            <div class="fund-today-amount ${status} ${hot ? 'hot' : ''}">${fmtMoney(h.todayProfit)}</div>
            <div class="fund-today-label">当日收益</div>
          </div>
          <div class="fund-profit">
            <div class="fund-profit-amount ${status}">${fmtMoney(h.profit)}</div>
            <div class="fund-profit-rate">${fmtRate(profitRate)}</div>
          </div>
          ${!showAccount ? `
          <div class="fund-actions">
            <button class="fund-action-btn" onclick="openFundModal(${JSON.stringify(h).replace(/"/g, '&quot;')})">✏️</button>
            <button class="fund-action-btn delete" onclick="deleteFund('${h.id}')">🗑️</button>
          </div>` : ''}
        </div>`;
    }

    async function loadData() {
      try {
        const res = await fetch(`${API}/overview`);
        const result = await res.json();
        if (result.success) {
          overviewData = result.data;
          accountsData = result.data.accounts || [];
          if (currentAccount) {
            currentAccount = accountsData.find(a => a.id === currentAccount.id) || null;
          }
        }
      } catch (err) {
        console.error('加载失败', err);
        overviewData = null;
        accountsData = [];
        currentAccount = null;
      }
      renderAccounts();
      renderOverview();
      renderFunds();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      setInterval(loadData, 10 * 60 * 1000);

      const fundNameInput = document.getElementById('fundName');
      fundNameInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchFunds(e.target.value), 300);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
          document.getElementById('searchResults').classList.remove('active');
        }
      });
    });

    ['accountModal', 'fundModal'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target.classList.contains('modal-overlay')) {
          document.getElementById(id).classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
